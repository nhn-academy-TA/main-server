services:
  babchu-service:
    build: .
    container_name: babchu-service
    expose:
      - "8080"

  nginx:
    image: nginx:alpine
    container_name: babchu-nginx
    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - babchu-service



