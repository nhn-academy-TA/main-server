name: Simple SSH Deploy

on:
  push:
    branches: [ "main" ] # main 브랜치에 푸시하면 배포 시작

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 19190
          script: |
            # 1. 프로젝트 폴더로 이동 (폴더명 확인 필수!)
            cd /Users/server-admin/server/main-server
            
            # 2. 최신 코드 가져오기
            git pull origin main
            
            # 3. 환경 변수 파일 확인 (서버에 미리 있어야 함)
            # 만약 .env도 자동 갱신하고 싶다면 여기에 echo 설정을 추가할 수 있어.
            
            /usr/local/bin/docker compose down
            /usr/local/bin/docker compose up -d --build